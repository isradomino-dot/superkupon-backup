<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline · SuperKupon</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e1b2e 0%, #0f172a 100%);
    color: #e2e8f0;
    padding: 1.5rem;
  }
  .card {
    max-width: 28rem;
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 1.25rem;
    padding: 2rem;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .icon {
    font-size: 4rem;
    margin-bottom: 0.5rem;
    line-height: 1;
  }
  h1 {
    margin: 0.5rem 0 0.25rem;
    font-size: 1.5rem;
    font-weight: 800;
    color: #f8fafc;
  }
  p {
    margin: 0.5rem 0 1.5rem;
    color: #94a3b8;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  button, a.btn {
    appearance: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.625rem 1.25rem;
    border-radius: 0.5rem;
    transition: opacity 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .primary {
    background: #8b5cf6;
    color: white;
  }
  .primary:hover { opacity: 0.9; }
  .secondary {
    background: rgba(255, 255, 255, 0.08);
    color: #e2e8f0;
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .secondary:hover { background: rgba(255, 255, 255, 0.12); }
  .footer {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: #64748b;
  }
  .status {
    margin-top: 1rem;
    font-size: 0.75rem;
    color: #fb923c;
  }
  .status.online {
    color: #4ade80;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Lo lagi offline</h1>
    <p>
      Koneksi internet putus atau backend lagi gak respons.
      Kupon yang udah lo lihat sebelumnya masih bisa diakses dari cache.
    </p>
    <div class="actions">
      <button class="primary" type="button" onclick="location.reload()">↻ Coba Lagi</button>
      <a class="btn secondary" href="/">🏠 Ke Beranda (cached)</a>
      <a class="btn secondary" href="/favorites">♥ Lihat Favorit (offline-ready)</a>
    </div>
    <div id="status" class="status">⚠️ Status: Offline</div>
    <p class="footer">SuperKupon · Cache-powered offline mode</p>
  </div>
  <script>
    function updateStatus() {
      const el = document.getElementById('status');
      if (navigator.onLine) {
        el.textContent = '✓ Online! Tap "Coba Lagi" untuk reload.';
        el.classList.add('online');
      } else {
        el.textContent = '⚠️ Status: Offline';
        el.classList.remove('online');
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
