<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Plus+Jakarta+Sans:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
  .slide {
    width: 1080px; height: 1080px;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(139, 92, 246, 0.5), transparent 60%),
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(236, 72, 153, 0.4), transparent 60%),
      linear-gradient(180deg, #1a0f2e 0%, #2e1a4a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px; text-align: center;
  }
  .logo {
    width: 140px; height: 140px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    border-radius: 32px; display: flex; align-items: center; justify-content: center;
    font-size: 80px; margin-bottom: 40px;
    box-shadow: 0 20px 60px rgba(139, 92, 246, 0.6);
  }
  .title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 130px; font-weight: 900;
    background: linear-gradient(135deg, #ffffff, #c4b5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.03em; margin-bottom: 30px;
  }
  .subtitle {
    font-size: 42px; color: #e9d5ff; font-weight: 500;
    max-width: 800px; line-height: 1.3; margin-bottom: 60px;
  }
  .pills { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .pills span {
    padding: 18px 36px; background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 999px;
    font-size: 28px; font-weight: 600;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="logo">🎯</div>
  <h1 class="title">SuperKupon</h1>
  <p class="subtitle">Aggregator kupon digital Indonesia<br>paling hemat &amp; simpel</p>
  <div class="pills">
    <span>🛒 Shopee</span>
    <span>🟢 Tokopedia</span>
    <span>🚗 Grab</span>
    <span>🟡 Gojek</span>
  </div>
</div>
</body>
</html>
