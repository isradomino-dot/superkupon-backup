<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
  .slide {
    width: 1080px; height: 1920px;
    background:
      radial-gradient(ellipse 80% 40% at 50% 20%, rgba(236, 72, 153, 0.4), transparent 60%),
      radial-gradient(ellipse 80% 40% at 50% 80%, rgba(56, 189, 248, 0.25), transparent 60%),
      linear-gradient(180deg, #0f0e1a 0%, #2a1a4a 50%, #4c1d95 100%);
    display: flex; flex-direction: column; align-items: center;
    padding: 200px 80px 150px; text-align: center; position: relative;
  }
  .badge {
    background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 16px 36px; border-radius: 999px;
    font-size: 26px; font-weight: 700; margin-bottom: 80px; letter-spacing: 0.05em;
  }
  .logo {
    width: 180px; height: 180px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    border-radius: 40px; display: flex; align-items: center; justify-content: center;
    font-size: 100px; margin-bottom: 60px;
    box-shadow: 0 25px 80px rgba(236, 72, 153, 0.6);
  }
  .title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 150px; font-weight: 900;
    background: linear-gradient(135deg, #ffffff, #fbcfe8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.03em; margin-bottom: 40px;
  }
  .tagline {
    font-size: 50px; color: #f3e8ff; font-weight: 500;
    line-height: 1.3; margin-bottom: 100px; max-width: 800px;
  }
  .features {
    display: flex; flex-direction: column; gap: 30px;
    margin-bottom: 100px; width: 100%; max-width: 700px;
  }
  .feature {
    background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 24px; padding: 28px 36px;
    display: flex; align-items: center; gap: 24px;
    font-size: 38px; font-weight: 600;
  }
  .feature span:first-child { font-size: 56px; }
  .cta-box {
    background: white; padding: 36px 60px; border-radius: 28px;
    margin-bottom: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
  }
  .cta-box p { color: #6b21a8; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .cta-box h2 {
    color: #4c1d95; font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 54px; font-weight: 900;
  }
  .swipe { font-size: 36px; color: #fbcfe8; font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <div class="badge">🎉 NEW LAUNCH</div>
  <div class="logo">🎯</div>
  <h1 class="title">SuperKupon</h1>
  <p class="tagline">Kupon paling hemat<br>dalam 2 step doang</p>
  <div class="features">
    <div class="feature"><span>🎯</span><span>Smart Pick auto</span></div>
    <div class="feature"><span>🧮</span><span>Cart Calculator</span></div>
    <div class="feature"><span>🏆</span><span>Hall of Fame</span></div>
  </div>
  <div class="cta-box">
    <p>🔗 Cobain sekarang:</p>
    <h2>superkupon.vercel.app</h2>
  </div>
  <p class="swipe">⬆️ Swipe Up</p>
</div>
</body>
</html>
