services:
  postgres:
    image: postgres:16-alpine
    container_name: coupon-postgres
    environment:
      POSTGRES_USER: coupon
      POSTGRES_PASSWORD: coupon
      POSTGRES_DB: coupon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coupon"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: coupon-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+psycopg://coupon:coupon@postgres:5432/coupon
      - SCRAPER_USE_MOCK=true
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  web:
    build: ./web
    container_name: coupon-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
