# ============================================================
# Render Blueprint — SuperKupon backend
# Deploy via: Render Dashboard → New → Blueprint → connect repo
# https://render.com/docs/blueprint-spec
# ============================================================

databases:
  - name: superkupon-db
    plan: free
    region: singapore
    databaseName: superkupon
    user: superkupon

services:
  - type: web
    name: superkupon-backend
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Auto-injected dari Render Postgres connection
      - key: DATABASE_URL
        fromDatabase:
          name: superkupon-db
          property: connectionString
      # CORS — set via dashboard setelah Vercel deployed:
      # ["https://your-app.vercel.app","https://*.vercel.app"]
      - key: CORS_ORIGINS
        sync: false
      # Allow semua *.vercel.app preview URLs lewat regex
      - key: CORS_ORIGIN_REGEX
        value: "https://([a-z0-9-]+\\.)?vercel\\.app"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SCRAPER_USE_MOCK
        value: "true"
      # PORT auto-injected oleh Render
