name: Publish create-lintasai

# Terbitkan paket scaffolder `create-lintasai` ke npm (untuk `npm create lintasai`).
# Manual (tombol "Run workflow") karena paket ini jarang berubah - cukup sekali terbit.
# Idempotent: kalau versi di package.json sudah ada di npm, langkah publish dilewati.
on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write WAJIB untuk npm Trusted Publishing (OIDC) — lihat penjelasan di
      # publish-npm.yml. Tanpa NPM_TOKEN; provenance otomatis untuk repo publik ini.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing (OIDC) butuh npm >= 11.5.1; Node 22 membawa npm 10.x -> upgrade dulu.
      - name: Pasang npm terbaru (>=11.5.1, syarat OIDC Trusted Publishing)
        run: |
          npm install -g npm@latest
          npm --version
      - name: Gerbang cek (index.js valid + package.json benar) sebelum terbit
        working-directory: create-lintasai
        run: |
          node --check index.js
          node -e "const p=require('./package.json'); if(p.name!=='create-lintasai'){throw new Error('nama paket salah: '+p.name)} if(!p.bin||!p.bin['create-lintasai']){throw new Error('bin create-lintasai hilang')}"
          echo "gerbang cek create-lintasai: OK"
      - name: Publish create-lintasai (skip kalau versi sudah terbit)
        working-directory: create-lintasai
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "create-lintasai version: $VER"
          if npm view "create-lintasai@$VER" version >/dev/null 2>&1; then
            echo "create-lintasai@$VER sudah terbit - lewati (tidak ada yang diterbitkan)."
            exit 0
          fi
          npm publish --access public
        # OIDC Trusted Publishing: TANPA token (jangan set NODE_AUTH_TOKEN). `npm view` di atas
        # cuma-baca (tak butuh auth). provenance otomatis (publishConfig.provenance:true).
