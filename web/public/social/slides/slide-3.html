<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Plus+Jakarta+Sans:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
  .slide {
    width: 1080px; height: 1080px;
    background: linear-gradient(180deg, #0a0815 0%, #1a0f2e 100%);
    padding: 90px 80px; display: flex; flex-direction: column;
  }
  .title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 75px; font-weight: 800;
    text-align: center; margin-bottom: 60px; line-height: 1.1;
  }
  .title span {
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .cards { display: flex; flex-direction: column; gap: 24px; flex: 1; justify-content: center; }
  .card {
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.1));
    border: 1.5px solid rgba(167, 139, 250, 0.3); border-radius: 32px;
    padding: 36px 44px; display: flex; align-items: center; gap: 32px;
  }
  .card-emoji {
    font-size: 90px; width: 130px; height: 130px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    border-radius: 28px; flex-shrink: 0;
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
  }
  .card-text h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 46px; font-weight: 800; margin-bottom: 8px;
  }
  .card-text p { font-size: 28px; color: #cbd5e1; line-height: 1.4; }
</style>
</head>
<body>
<div class="slide">
  <h1 class="title">Yang bikin <span>beda</span> 🔥</h1>
  <div class="cards">
    <div class="card">
      <div class="card-emoji">🎯</div>
      <div class="card-text">
        <h3>Smart Pick</h3>
        <p>Pilih kategori + nominal → dapat top 3 kupon paling hemat</p>
      </div>
    </div>
    <div class="card">
      <div class="card-emoji">🧮</div>
      <div class="card-text">
        <h3>Cart Calculator</h3>
        <p>Hitung total hemat sebelum checkout, gabung 2-3 kupon</p>
      </div>
    </div>
    <div class="card">
      <div class="card-emoji">🏆</div>
      <div class="card-text">
        <h3>Hall of Fame</h3>
        <p>Kupon paling sadis hari ini, di-update tiap jam</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
