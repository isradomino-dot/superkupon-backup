# ============================================================
# Railway deploy config — FastAPI backend
# Auto-deploy via Dockerfile + $PORT env var
# ============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand dihapus — pakai Dockerfile CMD yg udah pake shell expansion ${PORT:-8000}
# Railway gak substitusi $PORT di startCommand — bug umum, lebih aman pake Dockerfile shell CMD
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Region: ap-southeast-1 (Singapore) — closest ke user Indonesia
# Set via Railway dashboard atau env: RAILWAY_REGION=ap-southeast-1
