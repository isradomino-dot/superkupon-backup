<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SuperKupon — Built with AI in 19 Days</title>
<style>
  :root {
    --bg: #0a0e27;
    --bg-2: #111538;
    --surface: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.1);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #fbbf24;
    --accent-2: #f472b6;
    --gradient: linear-gradient(135deg, #fbbf24 0%, #f472b6 50%, #818cf8 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    line-height: 1.6;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(251, 191, 36, 0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(244, 114, 182, 0.08), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(129, 140, 248, 0.05), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .deck {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 80px;
    opacity: 0;
    visibility: hidden;
    transform: translateX(40px);
    transition: opacity 0.35s ease, transform 0.35s ease, visibility 0s linear 0.35s;
    overflow-y: auto;
  }
  .slide.active {
    opacity: 1;
    visibility: visible;
    transform: translateX(0);
    transition: opacity 0.35s ease, transform 0.35s ease, visibility 0s;
  }
  .slide-inner {
    max-width: 1100px;
    width: 100%;
    padding: 40px;
    border-radius: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
  }
  .slide-inner h1 {
    font-size: clamp(48px, 6vw, 88px);
    font-weight: 900;
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 16px;
    letter-spacing: -0.03em;
    line-height: 1.05;
  }
  .slide-inner h2 {
    font-size: clamp(28px, 3.2vw, 44px);
    font-weight: 800;
    color: var(--text);
    margin-bottom: 18px;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }
  .slide-inner h3 {
    font-size: clamp(20px, 2vw, 26px);
    font-weight: 700;
    color: var(--accent);
    margin: 22px 0 12px;
  }
  .slide-inner p {
    font-size: clamp(16px, 1.4vw, 20px);
    color: var(--muted);
    margin-bottom: 14px;
  }
  .slide-inner p strong {
    color: var(--text);
    font-weight: 700;
  }
  .slide-inner ul {
    list-style: none;
    padding: 0;
    margin: 0 0 16px;
  }
  .slide-inner ul li {
    position: relative;
    padding: 10px 0 10px 32px;
    font-size: clamp(15px, 1.3vw, 18px);
    color: var(--text);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .slide-inner ul li:last-child { border-bottom: none; }
  .slide-inner ul li::before {
    content: '◆';
    position: absolute;
    left: 6px;
    top: 12px;
    color: var(--accent);
    font-size: 12px;
  }
  .slide-inner ul li strong {
    color: var(--text);
    font-weight: 700;
  }
  .slide-inner em {
    color: var(--muted);
    font-style: italic;
  }
  /* Title slide tweaks */
  .slide[data-type="title"] .slide-inner {
    text-align: center;
    background: transparent;
    border: none;
    box-shadow: none;
  }
  /* Closing & CTA tweaks */
  .slide[data-type="cta"] .slide-inner,
  .slide[data-type="closing"] .slide-inner {
    text-align: center;
  }
  /* Slide counter + navigation */
  .nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 18px;
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    border-radius: 999px;
    color: var(--muted);
    font-size: 13px;
  }
  .nav button {
    background: var(--gradient);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    color: #0a0e27;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .nav button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
  }
  .nav button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .counter {
    font-weight: 700;
    color: var(--text);
    min-width: 60px;
    text-align: center;
  }
  .hint {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 10;
    padding: 8px 14px;
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    border-radius: 999px;
    color: var(--muted);
    font-size: 12px;
  }
  .hint kbd {
    display: inline-block;
    padding: 2px 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    font-family: monospace;
    margin: 0 2px;
    color: var(--text);
  }
  /* Responsive */
  @media (max-width: 768px) {
    .slide { padding: 40px 24px; }
    .slide-inner { padding: 24px; }
    .hint { display: none; }
  }
</style>
</head>

const deck = document.getElementById('deck');
const counter = document.getElementById('counter');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

let currentIndex = 0;

function render() {
  deck.innerHTML = '';
  SLIDES.forEach((slide, idx) => {
    const el = document.createElement('section');
    el.className = 'slide' + (idx === 0 ? ' active' : '');
    el.dataset.type = slide.slide_type;
    el.dataset.index = idx;
    el.innerHTML = '<div class="slide-inner">' + slide.content_html + '</div>';
    deck.appendChild(el);
  });
  updateCounter();
}

function updateCounter() {
  counter.textContent = (currentIndex + 1) + ' / ' + SLIDES.length;
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === SLIDES.length - 1;
}

function goTo(index) {
  if (index < 0 || index >= SLIDES.length) return;
  const slides = deck.querySelectorAll('.slide');
  slides[currentIndex].classList.remove('active');
  currentIndex = index;
  slides[currentIndex].classList.add('active');
  updateCounter();
}

prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
nextBtn.addEventListener('click', () => goTo(currentIndex + 1));

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') goTo(currentIndex - 1);
  else if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') goTo(currentIndex + 1);
  else if (e.key === 'Home') goTo(0);
  else if (e.key === 'End') goTo(SLIDES.length - 1);
  else if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

render();
